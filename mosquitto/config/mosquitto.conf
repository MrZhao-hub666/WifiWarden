# WiFiWarden Mosquitto MQTT Broker
# ESP32 → 1883端口; FastAPI → 内部网络 mosquitto:1883

listener 1883
protocol mqtt
max_connections -1

# ---- 认证模式 ----
# 快速部署: allow_anonymous true（ESP32凭证忽略）
# 安全部署: 改 false，在服务器上执行:
#   docker exec wifiwarden-mqtt mosquitto_passwd -c /mosquitto/config/pwfile wifiwarden
#   然后输入密码
allow_anonymous true

# ---- ACL 访问控制 ----
# acl_file /mosquitto/config/acl.conf

# ---- 持久化 ----
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ---- 日志 ----
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true
