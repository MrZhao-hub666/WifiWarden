# Mosquitto 访问控制列表
# WiFiWardern 设备权限配置

# 默认用户 (WiFiWardern)
user wifiwarden
# 订阅权限
topic read wifiwarden/sense/#
topic read wifiwarden/status
topic read wifiwarden/honeypot
# 发布权限
topic write wifiwarden/command/#
topic write wifiwarden/sense/#
topic write wifiwarden/status
topic write wifiwarden/honeypot

# ESP32 设备 (通配符)
# 每个ESP设备只能发布自己的数据
pattern write wifiwarden/sense/%u
pattern read wifiwarden/command/%u

# 订阅系统主题
topic read $SYS/#

# 拒绝所有其他访问
pattern deny #
