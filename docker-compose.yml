services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: wifiwarden-web
    ports:
      - "5000:5000"
    environment:
      ENV: production
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: ${MQTT_USERNAME:-wifiwarden}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-CHANGE_ME}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
    volumes:
      - ./app/data:/app/data
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks:
      - wifiwarden
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/statistics"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: wifiwarden-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - wifiwarden

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: wifiwarden-mqtt
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - wifiwarden

networks:
  wifiwarden:
    driver: bridge
